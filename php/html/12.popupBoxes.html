<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js Popups</title>
    <link href="https://fonts.googleapis.com/css?family=Raleway:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic" rel="stylesheet" />
    <style>
        body {
            font-family: Raleway;
            text-align: center;
            vertical-align: middle;
        }
    </style>
    <script>
        function Alert() {
            alert ("Hi, Guys");
        }

        function confirm() {
            let result = confirm ("Do you want to continue?");
            if (result) {
                alert ("You pressed OK!");
            } else {
                alert ("You pressed Cancel!");
            }
        }

        function prompt() {
            let name = prompt ("Please enter your name: ", "Guest");
            if (name !== null && name.trim() !== "") {
                alert ("Hello, " + name + "!");
            } else {
                alert ("You didn't enter a name.");
            }
        }
    </script>
</head>
<body>
    <h1>Alert, Confirm, Prompt</h1>

    <button onclick="alert()">Alert</button>
    <button onclick="confirm()">Confirm</button>
    <button onclick="prompt()">Prompt</button>
</body>
</html>
