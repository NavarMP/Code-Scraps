<!DOCTYPE html>
<html>
<head>
    <title>Simple JavaScript Example</title>
    <script>
        function showMessage() {
            document.getElementById("demo").innerHTML ="Hi, Your പൂച്ച is here.";
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Magic Button</h2>
    <button onclick="showMessage()">പൂച്ചായിസം</button>
    <p id="demo"></p>
</body>
</html>
