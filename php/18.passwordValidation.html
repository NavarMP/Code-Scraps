<!--7. Write a JavaScript program for Password validation based on the following condition
Password and confirm password must be same
Length of password must be greater than 8 characters -->

<!DOCTYPE html>
<html>
<head>
    <title> Verification </title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet">
    <script>
        function verifyPassword() {
            var pw = document.getElementById("pswd").value;
            var pw1 = document.getElementById("pswd1").value;
            if(pw=="") {
                document.getElementById("message").innerHTML="**Fill the password!";
                return false;
            }
            if(pw.length <8) {
                document.getElementById("message").innerHTML = "length must be atleast 8 characters";
                return false;
            }
            if (pw.length > 15) {
                document.getElementById("message").innerHTML="** length must not exceed 15 characters";
                return false;
            } if(pw!=pw1) {
                document.getElementById("message").innerHTML="** password and confirm password must be same";
                return false;
            }
            alert("Password is correct");
        }
    </script>
    <style>
        body {
            background-color: #121212;
            color: white;
            text-align: center;
            font-family: Poppins, sans-serif;
        }
        input {
            border-radius: 5px;
            height: 25px;
            width: 200px;
        }
    </style>
</head>

<body>
    <h1 style="color: #f0d000">Study Tonight</h1>
    <h3> Validate password </h3>
    <form onsubmit="return verifyPassword()">
        <td> Enter Username</td>
        <input type="username" id="usr" value=""><br><br>
        <td> Enter Password </td>
        <input type="password" id="pswd" value="">
        Confirm password
        <input type="password" id="pswd1" value="">

        <span id="message" style="color: #f1f2f2"> </span><br><br>
        <input type="submit" value = "Submit" style="border-color: #f1f2f2">
        <button type="reset" value = "Reset" style="border-color: #f1f2f2">Reset</button>
    </form>
<body>
</html>
