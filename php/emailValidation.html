<!--6. Write a JavaScript Program to validate email based on the following condition
Mail id must contain the @ and character
There must be at least one character before and after the @.
There must be at least two characters after. (dot). -->

<!DOCTYPE html>
<html>
<head>
<script>
function validateemail() {
    var x=document.myform.email.value;
    var atposition=x.indexOf("@");
    var dotposition=x.lastIndexOf(".");
    if (atposition<1 || dotposition<atposition+2 || dotposition+2>=x.length) {
        alert("Please enter a valid e-mail address \n atpostion:"+atposition+"\n dotposition:"+dotposition);
        return false;
    }
}
</script>
</head>

<body>
    <form name="myform" method="post" action="http://www.javatpoint.com/javascriptpages/valid.jsp"
    onsubmit="return validateemail();">
        Email: <input type="text" name="email"><br/>
        <input type="submit" value="register">
    </form>
</body>
</html>
