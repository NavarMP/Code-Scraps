<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frameset Example</title>
    <style>
        /* Add some basic styling to make the layout more visually appealing */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100vh;
            display: block;
        }
        .container {
            display: flex;
            flex-direction: row;
            height: 100vh;
        }
        .menu-frame {
            width: 20%;
        }
        .content-frame {
                        width: 80%;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe class="menu-frame" src="form.html" frameborder="0"></iframe>
        <iframe class="content-frame" src="keygen.html" frameborder="0"></iframe>
    </div>
</body>
</html>
