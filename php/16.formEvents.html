<!DOCTYPE html>
<html>
<head>
    <title>Form Events Demo</title>
</head>
<body>
    <h2>Form Events Example</h2>
    
    <!-- Form Starts -->
    <form onsubmit="alert('Form Submitted!'); return false;"
        onreset="alert('Form Reset!')">

        <!-- onfocus & onblur -->
        <p>
            Name:
            <input type="text"
            onfocus="this.style.background='yellow'"
            onblur="this.style.background='white'"
            placeholder="Enter your name">
        </p>

        <!-- onchange -->
        <p>
            Choose a fruit:
            <select onchange="alert('You changed the option!')">
            <option>Apple</option>
            <option>Mango</option>
            <option>Banana</option>
            </select>
        </p>

        <!-- onselect -->
        <p>
            Note:
            <textarea onselect="alert('You selected some text!')">
            Try selecting this text
            </textarea>
        </p>

        <!-- Submit & Reset Buttons -->
        <p>
            <input type="submit" value="Submit"> <input type="reset" value="Reset">
        </p>
    </form>
    <!-- Form Ends -->
</body>
</html>
