<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Comprehensive Form</title>
</head>
<body>
    <form action="/submit" method="post" oninput="sum.value = (+a.value || 0) + (+b.value || 0)" style="max-width: 500px; margin: 2em auto; padding: 2em; border: 1px solid #ccc; border-radius: 8px; background: #f9f9f9; font-family: Arial, sans-serif;">
        <!-- Fieldset with legend -->
        <fieldset style="border: 1px solid #bbb; border-radius: 6px; padding: 1em; margin-bottom: 1.5em;">
            <legend style="font-weight: bold;">Personal Info</legend>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required style="width: 100%; padding: 0.5em; margin-bottom: 1em;"><br>
            <label for="bio">Bio:</label><br>
            <textarea id="bio" name="bio" rows="4" cols="50" placeholder="Tell us about yourself..." style="width: 100%; padding: 0.5em; margin-bottom: 1em;"></textarea>
            <label for="country">Country:</label><br>
            <select id="country" name="country" style="width: 100%; padding: 0.5em; margin-bottom: 1em;">
                <optgroup label="Asia">
                    <option value="IN">India</option>
                    <option value="CN">China</option>
                </optgroup>
                <optgroup label="Europe">
                    <option value="GB">UK</option>
                    <option value="DE">Germany</option>
                </optgroup>
            </select>
        </fieldset>
        <br>
        <!-- Input with datalist -->
        <label for="color">Favorite color:</label><br>
        <input list="colors" id="color" name="color" style="width: 100%; padding: 0.5em; margin-bottom: 1em;">
        <datalist id="colors">
            <option value="Red">
            <option value="Green">
            <option value="Blue">
            <option value="Yellow">
            <option value="Purple">
        </datalist>
        <br>
        <!-- Numeric inputs and output -->
        <fieldset style="border: 1px solid #bbb; border-radius: 6px; padding: 1em; margin-bottom: 1.5em;">
            <legend style="font-weight: bold;">Calculator</legend>
            <label for="a">A:</label>
            <input type="number" id="a" name="a" value="0" style="width: 80px; margin-right: 1em;">
            <label for="b">B:</label>
            <input type="number" id="b" name="b" value="0" style="width: 80px; margin-right: 1em;">
            <label for="sum">Sum:</label>
            <output name="sum" id="sum" for="a b">0</output>
        </fieldset>
        <!-- Key pair generator (legacy HTML5 element) -->
        <fieldset style="border: 1px solid #bbb; border-radius: 6px; padding: 1em; margin-bottom: 1.5em;">
            <legend style="font-weight: bold;">Security</legend>
            <label>Generate key:</label>
            <keygen name="userkey">
        </fieldset>
        <!-- Progress indicator-->
        <fieldset style="border: 1px solid #bbb; border-radius: 6px; padding: 1em; margin-bottom: 1.5em;">
            <legend style="font-weight: bold;">Upload Progress</legend>
            <label for="progressBar">Upload progress:</label>
            <progress id="progressBar" value="30" max="100" style="width: 100%;">30%</progress>
        </fieldset>

        <!-- Buttons -->
        <div style="text-align: center;">
            <button type="submit" style="padding: 0.5em 1.5em; margin: 0.5em; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer;">Submit</button>
            <button type="reset" style="padding: 0.5em 1.5em; margin: 0.5em; background: #6c757d; color: #fff; border: none; border-radius: 4px; cursor: pointer;">Reset</button>
            <button type="button" onclick="alert('Hello!')" style="padding: 0.5em 1.5em; margin: 0.5em; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer;">Click Me!</button>
        </div>
    </form>
</body>
</html>
