<!-- Simple Calculator: Add, Subtract, Multiply, Divide two numbers -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>
    <script>
        function calc(op) {
            let v1 = parseFloat(value1.value), v2 = parseFloat(value2.value), ans;
            if (op === '+') ans = v1 + v2;
            else if (op === '-') ans = v1 - v2;
            else if (op === '*') ans = v1 * v2;
            else if (op === '/') ans = v2 === 0 ? "Cannot divide by zero" : v1 / v2;
            answer.value = ans;
        }
    </script>
</head>
<body>
    <h2>Simple Calculator</h2>
    <input type="number" id="value1" value="1">
    <input type="number" id="value2" value="2"><br><br>
    <button onclick="calc('+')">Add</button>
    <button onclick="calc('-')">Subtract</button>
    <button onclick="calc('*')">Multiply</button>
    <button onclick="calc('/')">Divide</button><br><br>
